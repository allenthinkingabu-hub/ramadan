# PRD Writer Agent - RACI Matrix Configuration
# Defines roles and task-level RACI assignments for PRD writing.
# R=Responsible, A=Accountable, C=Consulted, I=Informed
# Editable: modify roles and assignments as team structure evolves.

version: "1.0"
last_updated: "2026-02-24"

roles:
  - id: PM_WRITER
    name: Product Manager (PRD Writer Agent)
    description: Primary author of the PRD; translates BRD business requirements into detailed product specifications.

  - id: PM_LEAD
    name: Product Lead / CPO
    description: Provides product vision, strategic direction, and final approval authority.

  - id: BA
    name: Business Analyst
    description: Source of BRD content; consults on business requirements traceability.

  - id: UX
    name: UX Designer / UX Researcher
    description: Provides user research insights, validates user flows, consults on interaction design.

  - id: TECH_LEAD
    name: Tech Lead / Solution Architect
    description: Validates technical feasibility, consults on system constraints and non-functional requirements.

  - id: PROJ_MGR
    name: Project Manager
    description: Oversees process, ensures timeline adherence, coordinates cross-functional stakeholders.

  - id: QA_LEAD
    name: QA Lead
    description: Consults on testability of requirements and acceptance criteria quality.

  - id: DEV_LEAD
    name: Development Lead
    description: Consults on implementation feasibility, effort estimation, and technical constraints.

  - id: STAKEHOLDER
    name: Business Stakeholder / End User Rep
    description: Provides domain knowledge, validates user scenarios and acceptance criteria.

  - id: LEGAL
    name: Legal / Compliance
    description: Consults on regulatory requirements, data privacy, and compliance constraints.

  - id: DATA
    name: Data Analyst / Data Engineer
    description: Consults on data requirements, analytics, and data flow specifications.

  - id: MARKETING
    name: Product Marketing
    description: Informed of product positioning, feature messaging, and go-to-market alignment.

tasks:
  - id: RACI-01
    name: Review & Understand Approved BRD
    assignments: { PM_WRITER: R, PM_LEAD: I, BA: C, UX: I, TECH_LEAD: I, PROJ_MGR: I, QA_LEAD: I, DEV_LEAD: I, STAKEHOLDER: I, LEGAL: I, DATA: I, MARKETING: I }

  - id: RACI-02
    name: Identify Product Stakeholders
    assignments: { PM_WRITER: R, PM_LEAD: C, BA: C, UX: I, TECH_LEAD: I, PROJ_MGR: A, QA_LEAD: I, DEV_LEAD: I, STAKEHOLDER: I, LEGAL: I, DATA: I, MARKETING: I }

  - id: RACI-03
    name: Conduct User & Market Research
    assignments: { PM_WRITER: R, PM_LEAD: I, BA: C, UX: C, TECH_LEAD: I, PROJ_MGR: I, QA_LEAD: I, DEV_LEAD: I, STAKEHOLDER: C, LEGAL: I, DATA: I, MARKETING: C }

  - id: RACI-04
    name: Define User Personas & Scenarios
    assignments: { PM_WRITER: R, PM_LEAD: C, BA: C, UX: C, TECH_LEAD: I, PROJ_MGR: I, QA_LEAD: I, DEV_LEAD: I, STAKEHOLDER: C, LEGAL: I, DATA: I, MARKETING: I }

  - id: RACI-05
