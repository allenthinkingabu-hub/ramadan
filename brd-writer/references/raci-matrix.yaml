# BRD Writer Agent - RACI Matrix Configuration
# Defines stakeholder roles and responsibilities for each BRD creation task.
# R = Responsible, A = Accountable, C = Consulted, I = Informed
# Modify this file to adjust roles and assignments as needed.

raci_name: brd-creation-raci
version: "1.0"

# Role definitions
roles:
  - role_id: BA
    name: "Business Analyst (BRD Writer Agent)"
    description: "Primary author of the BRD; elicits, analyzes, and documents requirements"

  - role_id: PM
    name: "Project Manager"
    description: "Oversees the process, ensures timeline adherence, coordinates stakeholders"

  - role_id: SPONSOR
    name: "Project Sponsor"
    description: "Provides strategic direction, funding authority, final approval"

  - role_id: SME
    name: "Subject Matter Expert"
    description: "Provides domain-specific knowledge and validates requirements"

  - role_id: END_USER
    name: "End User / Business Stakeholder"
    description: "Provides actual needs, validates requirements from user perspective"

  - role_id: ARCHITECT
    name: "Solution Architect / Tech Lead"
    description: "Validates technical feasibility, consults on non-functional requirements"

  - role_id: QA
    name: "QA Lead"
    description: "Consults on testability of requirements and acceptance criteria"

  - role_id: LEGAL
    name: "Legal / Compliance"
    description: "Consults on regulatory requirements and constraints"

# Task-level RACI assignments
tasks:
  - task_id: RACI-01
    name: "Identify Stakeholders"
    assignments:
      BA: R
      PM: A
      SPONSOR: C
      SME: I
      END_USER: I
      ARCHITECT: I
      QA: I
      LEGAL: I

  - task_id: RACI-02
    name: "Plan Requirements Elicitation"
    assignments:
      BA: R
      PM: A
      SPONSOR: I
